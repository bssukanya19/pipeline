<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS EC2 Deployment</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            width: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,.4);
        }

        h1 {
            color: #4ade80;
            margin-bottom: 15px;
        }

        p {
            margin: 8px 0;
            font-size: 18px;
        }

        .status {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 18px;
            background: #16a34a;
            border-radius: 20px;
            font-weight: bold;
        }

        table {
            width: 100%;
            margin-top: 25px;
            border-collapse: collapse;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,.2);
            text-align: left;
        }

        td:first-child {
            font-weight: bold;
            width: 40%;
        }

        #clock {
            font-size: 22px;
            color: #facc15;
            margin-top: 20px;
            font-weight: bold;
        }

        footer {
            margin-top: 30px;
            font-size: 14px;
            color: #d1d5db;
        }
    </style>
</head>
<body>

<div class="card">

    <h1>🚀 Deployment Successful</h1>

    <p>Your Ubuntu EC2 instance is running successfully.</p>

    <span class="status">NGINX Active</span>

    <table>
        <tr>
            <td>Operating System</td>
            <td>Ubuntu Server</td>
        </tr>
        <tr>
            <td>Web Server</td>
            <td>NGINX</td>
        </tr>
        <tr>
            <td>SSM Agent</td>
            <td>Installed</td>
        </tr>
        <tr>
            <td>CodeDeploy Agent</td>
            <td>Installed</td>
        </tr>
        <tr>
            <td>Environment</td>
            <td>AWS EC2</td>
        </tr>
    </table>

    <div id="clock"></div>

    <footer>
        Powered by NGINX • AWS EC2 • Ubuntu
    </footer>

</div>

<script>
function updateClock() {
    const now = new Date();

    document.getElementById("clock").innerHTML =
        "🕒 " + now.toLocaleString();
}

updateClock();
setInterval(updateClock, 1000);
</script>

</body>
</html>
